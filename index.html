<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Control Operativo de Folios</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-card: #111827;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent-cyan: #06b6d4; --accent-orange: #f97316; --accent-emerald: #10b981; --accent-pink: #ec4899;
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 20px; min-height: 100vh; }

        header { background-color: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; }
        .header-title-area { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        h1 { font-size: 24px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        h1 span { color: var(--accent-cyan); }

        .url-loader { display: flex; gap: 10px; background: var(--bg-primary); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color); flex-grow: 1; max-width: 650px; }
        .url-loader input { background: transparent; border: none; color: var(--text-main); flex-grow: 1; font-size: 13px; outline: none; }
        .url-loader button { background: var(--accent-cyan); border: none; color: var(--bg-primary); padding: 6px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .url-loader button:hover { opacity: 0.9; }

        .controls-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: var(--bg-primary); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .control-group { display: flex; flex-direction: column; gap: 6px; position: relative; }
        .control-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

        .multiselect-container { background: var(--bg-secondary); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; font-size: 14px; cursor: pointer; min-height: 38px; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .multiselect-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; margin-top: 4px; max-height: 250px; overflow-y: auto; z-index: 1000; padding: 5px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .multiselect-dropdown.show { display: block; }
        .multiselect-option { padding: 8px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); border-radius: 4px; cursor: pointer; }
        .multiselect-option.select-all-btn { border-bottom: 1px solid var(--border-color); color: var(--accent-cyan); font-weight: bold; }
        .multiselect-option:hover { background: var(--bg-secondary); color: var(--text-main); }
        .multiselect-option input { cursor: pointer; accent-color: var(--accent-cyan); }

        .time-toggle { display: flex; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; height: 38px; }
        .time-btn { flex: 1; padding: 8px; background: transparent; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .time-btn.active { background: var(--accent-cyan); color: var(--bg-primary); }

        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background-color: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .kpi-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; }
        .kpi-card.folios::before { background-color: var(--accent-cyan); }
        .kpi-card.categorias::before { background-color: var(--accent-orange); }
        .kpi-card.ubicaciones::before { background-color: var(--accent-emerald); }
        .kpi-info h3 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .kpi-value { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .kpi-icon { font-size: 28px; opacity: 0.3; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .chart-card { background-color: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; }
        .chart-card.full-width { grid-column: span 2; }
        @media (max-width: 1024px) { .chart-card.full-width { grid-column: span 1; } }
        .chart-title { font-size: 15px; font-weight: 600; color: var(--text-main); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .chart-title i { color: var(--accent-cyan); }
        .chart-wrapper { position: relative; width: 100%; min-height: 300px; max-height: 400px; }

        .matrix-container { width: 100%; max-height: 600px; overflow-y: auto; overflow-x: auto; margin-top: 10px; border: 1px solid var(--border-color); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th { background-color: var(--bg-secondary); color: var(--text-main); padding: 12px 16px; font-weight: 600; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 10; white-space: nowrap; }
        td { padding: 10px 16px; border-bottom: 1px solid var(--border-color); color: var(--text-muted); }
        tr:hover td { background-color: rgba(255,255,255,0.04); color: var(--text-main); }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: rgba(6, 182, 212, 0.15); color: var(--accent-cyan); }
        .badge.total { background: rgba(16, 185, 129, 0.2); color: var(--accent-emerald); font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="header-title-area">
            <h1><i class="fa-solid fa-chart-column"></i> Dashboard Operativo de Folios</h1>
            <div class="url-loader">
                <i class="fa-solid fa-link" style="align-self: center; color: var(--text-muted);"></i>
                <input type="text" id="csvUrlInput" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vQfc5iZSyeet-ZAJQnbF3vWVNYpMIFZu2N4u2_VlA9rxGYUc8LN81q8V6kR6lXlLJioehyCY2GWFdBe/pub?output=csv">
                <button onclick="reloadData()"><i class="fa-solid fa-rotate"></i> Recargar</button>
            </div>
        </div>

        <div class="controls-panel">
            <div class="control-group">
                <label>Frecuencia de Gráficos</label>
                <div class="time-toggle">
                    <button class="time-btn active" id="btnDiario" onclick="setTimeAgg('diario')">Diario</button>
                    <button class="time-btn" id="btnSemanal" onclick="setTimeAgg('semanal')">Semanal</button>
                    <button class="time-btn" id="btnMensual" onclick="setTimeAgg('mensual')">Mensual</button>
                </div>
            </div>

            <div class="control-group">
                <label>Mes</label>
                <div class="multiselect-container" onclick="toggleDropdown('dropdownMes')">
                    <span id="textMes">Todos</span> <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div id="dropdownMes" class="multiselect-dropdown"></div>
            </div>

            <div class="control-group">
                <label>Ubicación</label>
                <div class="multiselect-container" onclick="toggleDropdown('dropdownUbicacion')">
                    <span id="textUbicacion">Todas</span> <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div id="dropdownUbicacion" class="multiselect-dropdown"></div>
            </div>

            <div class="control-group">
                <label>Categoría de Servicio</label>
                <div class="multiselect-container" onclick="toggleDropdown('dropdownCategoria')">
                    <span id="textCategoria">Todas</span> <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div id="dropdownCategoria" class="multiselect-dropdown"></div>
            </div>
        </div>
    </header>

    <div class="kpi-container">
        <div class="kpi-card folios">
            <div class="kpi-info"><h3>Total Folios</h3><div class="kpi-value" id="kpiTotalFolios">0</div></div>
            <div class="kpi-icon" style="color: var(--accent-cyan);"><i class="fa-solid fa-file-lines"></i></div>
        </div>
        <div class="kpi-card categorias">
            <div class="kpi-info"><h3>Tipos de Categorías</h3><div class="kpi-value" id="kpiCategorias">0</div></div>
            <div class="kpi-icon" style="color: var(--accent-orange);"><i class="fa-solid fa-tags"></i></div>
        </div>
        <div class="kpi-card ubicaciones">
            <div class="kpi-info"><h3>Ubicaciones Registradas</h3><div class="kpi-value" id="kpiUbicaciones">0</div></div>
            <div class="kpi-icon" style="color: var(--accent-emerald);"><i class="fa-solid fa-location-crosshairs"></i></div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="chart-card">
            <div class="chart-title"><i class="fa-solid fa-chart-bar"></i> Volumen de Folios Activos</div>
            <div class="chart-wrapper"><canvas id="chartVolumenFecha"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title"><i class="fa-solid fa-calendar-days"></i> Historial de Folios por Mes</div>
            <div class="chart-wrapper"><canvas id="chartVolumenMensualFijo"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title"><i class="fa-solid fa-ranking-star"></i> Top 10 Ubicaciones</div>
            <div class="chart-wrapper"><canvas id="chartTopUbicaciones"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title"><i class="fa-solid fa-list-ol"></i> Top 10 Categorías de Servicio</div>
            <div class="chart-wrapper"><canvas id="chartTopCategorias"></canvas></div>
        </div>

        <div class="chart-card full-width">
            <div class="chart-title"><i class="fa-solid fa-table-cells"></i> Matriz Operativa: Ubicación vs Tipo de Servicio</div>
            <div class="matrix-container">
                <table id="matrixTable">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Inicializar Datalabels Seguro
        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        let rawData = [];
        let filteredData = [];
        let currentFrecuencia = 'diario';
        let charts = {};
        let selectedFilters = { mes: [], ubicacion: [], categoria: [] };
        let masterLists = { mes: [], ubicacion: [], categoria: [] };

        window.addEventListener('DOMContentLoaded', () => {
            loadDashboardData();
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.control-group')) {
                    document.querySelectorAll('.multiselect-dropdown').forEach(d => d.classList.remove('show'));
                }
            });
        });

        function toggleDropdown(id) {
            let el = document.getElementById(id);
            let isShown = el.classList.contains('show');
            document.querySelectorAll('.multiselect-dropdown').forEach(d => d.classList.remove('show'));
            if(!isShown) el.classList.add('show');
        }

        function setTimeAgg(val) {
            currentFrecuencia = val;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + val.charAt(0).toUpperCase() + val.slice(1)).classList.add('active');
            updateCharts();
        }

        function loadDashboardData() {
            const url = document.getElementById('csvUrlInput').value;
            // Usamos PapaParse (Infalible contra errores de comas o saltos de línea en celdas)
            Papa.parse(url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    procesarDatos(results.data);
                },
                error: function(err) {
                    alert("Error al conectar con Google Sheets. Asegúrate de que el enlace esté publicado en la web como CSV.");
                }
            });
        }

        function reloadData() { loadDashboardData(); }

        function procesarDatos(parsedData) {
            if(!parsedData || parsedData.length === 0) return;
            
            // Detectar los nombres de las columnas reales de forma automática
            let keys = Object.keys(parsedData[0]);
            let dateKey = keys.find(k => k.toLowerCase().includes('fecha')) || keys[0];
            let folioKey = keys.find(k => k.toLowerCase().includes('folio') || k.toLowerCase().includes('id')) || keys[1];
            let locKey = keys.find(k => k.toLowerCase().includes('ubicac') && !k.toLowerCase().includes('edif')) || keys[2];
            let catKey = keys.find(k => k.toLowerCase().includes('categor') || k.toLowerCase().includes('serv')) || keys[3];

            rawData = parsedData.map((row, index) => {
                let dateStr = row[dateKey] || '';
                let parts = dateStr.split(/[-/]/);
                let dateObj = new Date();
                if(parts.length === 3) {
                    if(parts[0].length === 4) dateObj = new Date(parts[0], parts[1]-1, parts[2]);
                    else dateObj = new Date(parts[2], parts[1]-1, parts[0]);
                }

                return {
                    'Fecha': dateStr,
                    'Folio': row[folioKey] || 'F-' + index,
                    'Ubicacion': (row[locKey] || 'No Definida').trim(),
                    'Categoria': (row[catKey] || 'Sin Categoría').trim(),
                    '_dateObj': dateObj
                };
            });
            buildFilters();
        }

        function buildFilters() {
            let meses = new Set();
            let ubicaciones = new Set();
            let categorias = new Set();

            rawData.forEach(item => {
                if(item._dateObj && !isNaN(item._dateObj)) {
                    let mLabel = item._dateObj.toLocaleString('es-MX', { month: 'long', year: 'numeric' });
                    meses.add(mLabel);
                }
                if(item.Ubicacion) ubicaciones.add(item.Ubicacion);
                if(item.Categoria) categorias.add(item.Categoria);
            });

            masterLists.mes = Array.from(meses).sort();
            masterLists.ubicacion = Array.from(ubicaciones).sort();
            masterLists.categoria = Array.from(categorias).sort();

            selectedFilters.mes = [];
            selectedFilters.ubicacion = [];
            selectedFilters.categoria = [];

            renderOptions('dropdownMes', masterLists.mes, 'mes');
            renderOptions('dropdownUbicacion', masterLists.ubicacion, 'ubicacion');
            renderOptions('dropdownCategoria', masterLists.categoria, 'categoria');

            applyFilters();
        }

        function renderOptions(dropdownId, list, type) {
            let container = document.getElementById(dropdownId);
            container.innerHTML = '';
            
            let allDiv = document.createElement('div');
            allDiv.className = 'multiselect-option select-all-btn';
            allDiv.innerHTML = `<i class="fa-solid fa-list-check"></i> <span>[ SELECCIONAR TODOS ]</span>`;
            allDiv.onclick = () => {
                let checkBoxes = container.querySelectorAll('input[type="checkbox"]');
                let genericTextSpan = document.getElementById('text' + type.charAt(0).toUpperCase() + type.slice(1));
                
                if (selectedFilters[type].length === list.length) {
                    selectedFilters[type] = [];
                    checkBoxes.forEach(cb => cb.checked = false);
                    genericTextSpan.innerText = (type === 'ubicacion' ? 'Todas' : 'Todos');
                } else {
                    selectedFilters[type] = [...list];
                    checkBoxes.forEach(cb => cb.checked = true);
                    genericTextSpan.innerText = "Todos (" + list.length + ")";
                }
                applyFilters();
            };
            container.appendChild(allDiv);

            list.forEach(item => {
                let div = document.createElement('div');
                div.className = 'multiselect-option';
                
                let checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = item;
                checkbox.checked = selectedFilters[type].includes(item);
                
                checkbox.addEventListener('change', (e) => {
                    if(e.target.checked) selectedFilters[type].push(item);
                    else selectedFilters[type] = selectedFilters[type].filter(x => x !== item);
                    
                    let labelContainer = document.getElementById('text' + type.charAt(0).toUpperCase() + type.slice(1));
                    if (selectedFilters[type].length === 0 || selectedFilters[type].length === list.length) {
                        labelContainer.innerText = (type === 'ubicacion' ? 'Todas' : 'Todos');
                    } else {
                        labelContainer.innerText = `${selectedFilters[type].length} sel.`;
                    }
                    applyFilters();
                });

                let label = document.createElement('span');
                label.innerText = item.charAt(0).toUpperCase() + item.slice(1);
                div.appendChild(checkbox);
                div.appendChild(label);
                div.onclick = (e) => { if(e.target !== checkbox) checkbox.click(); };
                container.appendChild(div);
            });
        }

        function applyFilters() {
            filteredData = rawData.filter(item => {
                let mLabel = item._dateObj.toLocaleString('es-MX', { month: 'long', year: 'numeric' });
                if(selectedFilters.mes.length > 0 && !selectedFilters.mes.includes(mLabel)) return false;
                if(selectedFilters.ubicacion.length > 0 && !selectedFilters.ubicacion.includes(item.Ubicacion)) return false;
                if(selectedFilters.categoria.length > 0 && !selectedFilters.categoria.includes(item.Categoria)) return false;
                return true;
            });

            document.getElementById('kpiTotalFolios').innerText = filteredData.length;
            document.getElementById('kpiCategorias').innerText = new Set(filteredData.map(i => i.Categoria)).size;
            document.getElementById('kpiUbicaciones').innerText = new Set(filteredData.map(i => i.Ubicacion)).size;

            updateCharts();
            renderMatrix();
        }

        function getFrequencyLabel(dateObj) {
            if (currentFrecuencia === 'mensual') {
                return dateObj.toLocaleString('es-MX', { month: 'short', year: 'numeric' });
            } else if (currentFrecuencia === 'semanal') {
                let oneJan = new Date(dateObj.getFullYear(), 0, 1);
                let numberOfDays = Math.floor((dateObj - oneJan) / (24 * 60 * 60 * 1000));
                return `Sem ${Math.ceil((dateObj.getDay() + 1 + numberOfDays) / 7)} (${dateObj.getFullYear()})`;
            } else {
                return dateObj.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
            }
        }

        // Configuración de DataLabels robusta
        const dataLabelsConfig = {
            color: '#ffffff',
            font: { weight: 'bold', size: 12 },
            formatter: Math.round
        };

        function updateCharts() {
            Object.keys(charts).forEach(k => { if(charts[k]) charts[k].destroy(); });

            let timeCounts = {};
            filteredData.sort((a,b) => a._dateObj - b._dateObj).forEach(i => {
                let lbl = getFrequencyLabel(i._dateObj);
                timeCounts[lbl] = (timeCounts[lbl] || 0) + 1;
            });

            charts['volumen'] = new Chart(document.getElementById('chartVolumenFecha').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: Object.keys(timeCounts),
                    datasets: [{ data: Object.values(timeCounts), backgroundColor: '#06b6d4', borderRadius: 4 }]
                },
                options: {
                    layout: { padding: { top: 25 } },
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, datalabels: { ...dataLabelsConfig, anchor: 'end', align: 'top' } },
                    scales: { x: { grid: { display: false } }, y: { beginAtZero: true } }
                }
            });

            let monthlyDistribution = {};
            filteredData.forEach(i => {
                if(i._dateObj && !isNaN(i._dateObj)){
                    let mName = i._dateObj.toLocaleString('es-MX', { month: 'short', year: 'numeric' });
                    monthlyDistribution[mName] = (monthlyDistribution[mName] || 0) + 1;
                }
            });

            charts['mensual'] = new Chart(document.getElementById('chartVolumenMensualFijo').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: Object.keys(monthlyDistribution).map(m => m.toUpperCase()),
                    datasets: [{ data: Object.values(monthlyDistribution), backgroundColor: '#ec4899', borderRadius: 4 }]
                },
                options: {
                    layout: { padding: { top: 25 } },
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, datalabels: { ...dataLabelsConfig, anchor: 'end', align: 'top' } },
                    scales: { x: { grid: { display: false } }, y: { beginAtZero: true } }
                }
            });

            let ubiCounts = {};
            filteredData.forEach(i => { ubiCounts[i.Ubicacion] = (ubiCounts[i.Ubicacion] || 0) + 1; });
            let sortedUbis = Object.entries(ubiCounts).sort((a,b) => b[1] - a[1]).slice(0, 10);

            charts['topUbi'] = new Chart(document.getElementById('chartTopUbicaciones').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: sortedUbis.map(x => x[0]),
                    datasets: [{ data: sortedUbis.map(x => x[1]), backgroundColor: '#10b981', borderRadius: 4 }]
                },
                options: {
                    indexAxis: 'y',
                    layout: { padding: { right: 35 } },
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, datalabels: { ...dataLabelsConfig, anchor: 'end', align: 'right' } },
                    scales: { x: { beginAtZero: true }, y: { grid: { display: false } } }
                }
            });

            let catCounts = {};
            filteredData.forEach(i => { catCounts[i.Categoria] = (catCounts[i.Categoria] || 0) + 1; });
            let sortedCats = Object.entries(catCounts).sort((a,b) => b[1] - a[1]).slice(0, 10);

            charts['topCat'] = new Chart(document.getElementById('chartTopCategorias').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: sortedCats.map(x => x[0]),
                    datasets: [{ data: sortedCats.map(x => x[1]), backgroundColor: '#f97316', borderRadius: 4 }]
                },
                options: {
                    layout: { padding: { top: 25 } },
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, datalabels: { ...dataLabelsConfig, anchor: 'end', align: 'top' } },
                    scales: { x: { grid: { display: false } }, y: { beginAtZero: true } }
                }
            });
        }

        function renderMatrix() {
            let uniqueCats = Array.from(new Set(filteredData.map(i => i.Categoria))).sort();
            let uniqueUbis = Array.from(new Set(filteredData.map(i => i.Ubicacion))).sort();
            
            let matrixThead = document.querySelector('#matrixTable thead');
            let matrixTbody = document.querySelector('#matrixTable tbody');

            if(uniqueCats.length === 0) {
                matrixThead.innerHTML = '';
                matrixTbody.innerHTML = '<tr><td style="text-align: center; padding: 30px;">No hay datos disponibles. Selecciona otros filtros.</td></tr>';
                return;
            }

            let headerHtml = '<tr><th>Ubicación Filtrada</th>';
            uniqueCats.forEach(c => { headerHtml += `<th>${c}</th>`; });
            headerHtml += '<th>Total General</th></tr>';
            matrixThead.innerHTML = headerHtml;

            matrixTbody.innerHTML = '';
            uniqueUbis.forEach(u => {
                let rowHtml = `<tr><td><strong>${u}</strong></td>`;
                let rowTotal = 0;
                uniqueCats.forEach(c => {
                    let count = filteredData.filter(x => x.Ubicacion === u && x.Categoria === c).length;
                    rowHtml += `<td>${count === 0 ? '<span style="opacity: 0.3">-</span>' : count}</td>`;
                    rowTotal += count;
                });
                rowHtml += `<td><span class="badge total">${rowTotal}</span></td></tr>`;
                matrixTbody.innerHTML += rowHtml;
            });
        }
    </script>
</body>
</html>
